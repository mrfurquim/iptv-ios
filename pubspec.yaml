name: iptv_player
description: "IPTV Player - Flutter app for live TV, movies and series"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Video player
  video_player: ^2.8.1
  chewie: ^1.7.5
  
  # Networking & Storage
  http: ^1.2.0
  shared_preferences: ^2.2.3
  
  # UI Enhancements
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.10+1
  
  # Utils
  path_provider: ^2.1.1
  intl: ^0.19.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_cast_video:
    path: packages/flutter_cast_video

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
