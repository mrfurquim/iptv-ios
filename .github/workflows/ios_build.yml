name: Build iOS IPA

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Adjust if you need a specific version
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS Project
        run: |
          # 1. Force iOS 14.0 in Xcode project
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # 2. Force iOS 14.0 in Podfile
          if [ -f ios/Podfile ]; then
            sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
            sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
            
            # Inject post_install hook to force all Pods to compile for iOS 14.0
            ruby -i -e "puts ARGF.read.gsub(/flutter_additional_ios_build_settings\(target\)/, %q{flutter_additional_ios_build_settings(target)
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
            end})" ios/Podfile
          fi

      - name: Build Flutter (AOT & Frameworks)
        run: |
          # This compiles Dart and generates Pods, but might fail at Xcode signing. We ignore the error.
          flutter build ios --release --no-codesign || true

      - name: Build iOS App with Xcode
        run: |
          cd ios
          # The -destination and COMPILER_INDEX_STORE_ENABLE=NO flags fix the "ScanDependencies" Xcode 15 bug
          xcodebuild clean build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA Payload
        run: |
          mkdir -p Payload
          # xcodebuild outputs the .app in a different path when using standard build
          # Usually it's in build/Release-iphoneos/ or DerivedData
          # But flutter build ios configures SYMROOT. Let's find the .app dynamically
          APP_PATH=$(find . -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found!"
            exit 1
          fi
          mv "$APP_PATH" Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-ioss
          path: app.ipa

