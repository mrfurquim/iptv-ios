name: Build iOS IPA

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Adjust if you need a specific version
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS Project
        run: |
          # 1. Disable Code Signing for the Runner target ONLY (avoids breaking Pods in Xcode 15)
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_IDENTITY = \"-\"" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY = \"-\"" >> ios/Flutter/Release.xcconfig
          
          # 2. Force iOS 14.0 in Xcode project
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # 3. Force iOS 14.0 in Podfile
          if [ -f ios/Podfile ]; then
            sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
            sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
            
            # Inject post_install hook to force all Pods to compile for iOS 14.0
            ruby -i -e "puts ARGF.read.gsub(/flutter_additional_ios_build_settings\(target\)/, %q{flutter_additional_ios_build_settings(target)
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
            end})" ios/Podfile
          fi

      - name: Build iOS App
        run: flutter build ios --release --no-codesign

      - name: Create IPA Payload
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-ioss
          path: app.ipa

