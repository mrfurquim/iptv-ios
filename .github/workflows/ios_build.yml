name: Build iOS IPA

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Adjust if you need a specific version
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA (Payload for SideStore)
        run: |
          # Gera os arquivos do Flutter e Pods (vai falhar no signing mas não tem problema, o que importa é preparar o projeto)
          flutter build ios --release --no-codesign || true
          
          # Forçar versão do iOS para 14.0 no projeto Xcode
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # Forçar versão do iOS para 14.0 e corrigir Pods
          if [ -f ios/Podfile ]; then
            sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
            sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
            echo "" >> ios/Podfile
            echo "post_install do |installer|" >> ios/Podfile
            echo "  installer.pods_project.targets.each do |target|" >> ios/Podfile
            echo "    target.build_configurations.each do |config|" >> ios/Podfile
            echo "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'" >> ios/Podfile
            echo "    end" >> ios/Podfile
            echo "  end" >> ios/Podfile
            echo "end" >> ios/Podfile
            cd ios && pod install && cd ..
          fi
          
          # Compila o app direto pelo Xcode forçando a desativação da assinatura da Apple
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          
          # Cria o formato do IPA (Payload)
          cd ..
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-ios
          path: app.ipa
